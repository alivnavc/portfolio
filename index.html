<!DOCTYPE html>
<html lang="en" data-tftheme="paper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Codex — interactive AI explainers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ui/styles-tf.css?v=2" />
  <link rel="stylesheet" href="styles-home.css?v=2" />
</head>
<body>
  <div class="home" id="home"></div>

  <script src="profile.js"></script>
  <script src="catalog.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="three-bg.js"></script>
  <script>
    (function () {
      var S = window.SITE, P = window.PROFILE || { name: "", role: "", github: "#" };
      document.documentElement.setAttribute("data-tftheme", "paper");

      var liveCount = 0;
      S.topics.forEach(function (t) { t.articles.forEach(function (a) { if (a.status === "live") liveCount++; }); });

      var arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
      var gh = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.93.68 1.88 0 1.36-.01 2.46-.01 2.8 0 .27.18.6.69.49A10.03 10.03 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>';
      var brandMark = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.4"/><circle cx="5" cy="6" r="1.6"/><circle cx="19" cy="6" r="1.6"/><circle cx="5" cy="18" r="1.6"/><circle cx="19" cy="18" r="1.6"/><path d="M6.6 7 10 10.4M17.4 7 14 10.4M6.6 17 10 13.6M17.4 17 14 13.6"/></svg>';

      function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

      function card(a) {
        var live = a.status === "live";
        var tags = (a.tags || []).map(function (t) { return '<span class="card-tag">' + esc(t) + '</span>'; }).join("");
        var inner =
          '<div class="card-top">' +
            (a.steps ? '<span class="card-step">' + a.steps + ' steps</span>' : '<span></span>') +
            '<span class="card-status ' + (live ? "live" : "soon") + '">' + (live ? "Live" : "Soon") + '</span>' +
          '</div>' +
          '<div><div class="card-title">' + esc(a.title) + '</div>' +
          (a.sub ? '<div class="card-sub">' + esc(a.sub) + '</div>' : '') + '</div>' +
          '<div class="card-desc">' + esc(a.desc || "") + '</div>' +
          '<div class="card-tags">' + tags + '</div>' +
          (live ? '<div class="card-go">Open explainer ' + arrow + '</div>' : '<div class="card-go" style="color:var(--faint)">In production</div>');
        if (live) return '<a class="card" href="' + encodeURI(a.href) + '">' + inner + '</a>';
        return '<div class="card is-soon">' + inner + '</div>';
      }

      function topic(t) {
        var live = t.articles.filter(function (a) { return a.status === "live"; }).length;
        return '<section class="topic" id="topic-' + t.id + '">' +
          '<div class="topic-head">' +
            '<div class="topic-ic">' + t.icon + '</div>' +
            '<div class="topic-meta">' +
              '<div class="topic-kicker">' + esc(t.kicker || "") + '</div>' +
              '<div class="topic-title">' + esc(t.title) + '</div>' +
              '<div class="topic-desc">' + esc(t.desc || "") + '</div>' +
            '</div>' +
            '<div class="topic-count">' + live + ' / ' + t.articles.length + ' live</div>' +
          '</div>' +
          '<div class="grid">' + t.articles.map(card).join("") + '</div>' +
        '</section>';
      }

      document.getElementById("home").innerHTML =
        '<nav class="home-nav">' +
          '<a class="home-brand" href="index.html">' +
            '<span class="home-brand-mark">' + brandMark + '</span>' +
            '<span class="home-brand-name">' + esc(S.name) + '<small>' + esc(S.tagline) + '</small></span>' +
          '</a>' +
          '<div class="home-nav-links">' +
            '<a class="home-nav-link is-active" href="index.html">Home</a>' +
            '<a class="home-nav-link" href="about.html">About me</a>' +
          '</div>' +
          '<div class="home-nav-right"><a class="home-iconlink" href="' + esc(P.github) + '" target="_blank" rel="noopener" title="GitHub">' + gh + '</a></div>' +
        '</nav>' +

        '<header class="home-hero">' +
          '<div class="hero3d" id="hero3d-home"></div>' +
          '<div class="home-hero-grid"></div>' +
          '<div class="home-hero-inner">' +
            '<div class="home-eyebrow"><span class="dot"></span>Interactive · first-principles · zero hand-waving</div>' +
            '<h1>Take any AI model<br/><span class="grad">apart, layer by layer.</span></h1>' +
            '<p>' + esc(S.blurb) + '</p>' +
            '<div class="home-cta">' +
              '<a class="home-btn home-btn--primary" href="' + encodeURI(S.topics[0].articles[0].href) + '">Start with Transformers ' + arrow + '</a>' +
              '<a class="home-btn" href="about.html">About me</a>' +
            '</div>' +
          '</div>' +
        '</header>' +

        '<main class="home-body">' + S.topics.map(topic).join("") + '</main>' +

        '<footer class="home-foot">© Naveen ' + new Date().getFullYear() + '</footer>';

      if (window.NeuralBG) NeuralBG.init("hero3d-home", { color: 0x2B5BFF, count: 78 });
    })();
  </script>
</body>
</html>
