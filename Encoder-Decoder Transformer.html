<!DOCTYPE html>
<html lang="en" data-tftheme="paper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encoder–Decoder Transformer — visual walkthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ui/styles-tf.css?v=2" />
</head>
<body>
  <div id="root"></div>
  <div id="tf-loader" class="tf-loader">
    <div class="tf-loader-box">
      <div class="tf-loader-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.4"/><circle cx="5" cy="6" r="1.6"/><circle cx="19" cy="6" r="1.6"/><circle cx="5" cy="18" r="1.6"/><circle cx="19" cy="18" r="1.6"/><path d="M6.6 7 10 10.4M17.4 7 14 10.4M6.6 17 10 13.6M17.4 17 14 13.6"/></svg></div>
      <div class="tf-loader-spin"></div>
      <div class="tf-loader-txt">Loading explainer…</div>
    </div>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- model (plain JS) -->
  <script src="model/weights.js"></script>
  <script src="model/engine.js"></script>
  <script src="model/engine-encdec.js"></script>

  <!-- page config -->
  <script>
    window.TF_ARCH = "encdec";
    window.TF_RUN = window.TFEncDec.run;
    window.TF_META = {
      title: "Encoder–Decoder Transformer",
      subtitle: "how the original Transformer (T5 / translation) maps one sentence to another",
      mapTitle: "Enc–Dec",
      maskLabel: "Decoder mask",
      defaultMask: true,
      maskToggle: true,
      promptLabel: "source",
      target: [0, 1],
      targetLabel: "target so far",
    };
  </script>

  <!-- UI (JSX via Babel) -->
  <script type="text/babel" src="ui/matrix.jsx"></script>
  <script type="text/babel" src="ui/stages-a.jsx"></script>
  <script type="text/babel" src="ui/stages-b.jsx"></script>
  <script type="text/babel" src="ui/stages-encdec.jsx"></script>
  <script type="text/babel" src="ui/diagram.jsx"></script>
  <script type="text/babel" src="ui/app.jsx"></script>
</body>
</html>
